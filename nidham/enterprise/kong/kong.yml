# ============================================================================
# Kong declarative config — routes the Nidham app's traffic to the right
# Supabase service. The app calls a single base URL (KONG_HTTP_PORT) and Kong
# splits it:
#
#   /auth/v1/*    → gotrue   (signup/login/refresh/etc.)
#   /rest/v1/*    → postgrest (the public schema as REST)
#
# This is the SAME shape Supabase Cloud uses, so our app code needs no changes.
# ============================================================================

_format_version: "2.1"
_transform: true

services:
  # ---- GoTrue (auth) -------------------------------------------------------
  - name: auth-v1-open
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors

  - name: auth-v1-open-callback
    url: http://auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors

  - name: auth-v1-open-authorize
    url: http://auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors

  - name: auth-v1
    _comment: "All other GoTrue endpoints — requires the apikey header"
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
          key_names:
            - apikey

  # ---- PostgREST (the DB) --------------------------------------------------
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
          key_names:
            - apikey


# ----------------------------------------------------------------------------
# API keys — anon for unauthenticated access, service_role for backend admin
# ----------------------------------------------------------------------------
consumers:
  - username: anon
    keyauth_credentials:
      - key: ${ANON_KEY}
  - username: service_role
    keyauth_credentials:
      - key: ${SERVICE_ROLE_KEY}

# ----------------------------------------------------------------------------
# Global CORS — allow the Nidham app + LAN browsers to call us
# ----------------------------------------------------------------------------
plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PATCH
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Type
        - Origin
        - apikey
        - x-client-info
      credentials: false
      max_age: 3600
