<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0d1518"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="400" cy="400" r="320" stroke="#c9a84c" stroke-width="4" fill="url(#ring)"/>
  <!-- Inner circle -->
  <circle cx="400" cy="400" r="240" fill="#0a0f1a" stroke="rgba(201,168,76,0.3)" stroke-width="2"/>
  <!-- ن letter -->
  <text x="400" y="410" text-anchor="middle" font-size="300" font-weight="900" font-family="system-ui, sans-serif" fill="#c9a84c">ن</text>
  <!-- Accent dot -->
  <circle cx="530" cy="580" r="12" fill="#c9a84c"/>
</svg>
