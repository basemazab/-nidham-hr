<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مفيش اتصال — نِظام</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, "Segoe UI", "Cairo", Tahoma, sans-serif;
    }
    html, body { margin: 0; height: 100%; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #ecfeff 100%);
      color: #0f172a;
      padding: 1.5rem;
      text-align: center;
    }
    .card {
      max-width: 380px; background: #ffffff; padding: 2rem 1.5rem;
      border-radius: 1.5rem;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.08);
      border: 1px solid #e2e8f0;
    }
    .icon { font-size: 4rem; margin-bottom: 0.5rem; }
    h1 { font-size: 1.5rem; font-weight: 900; margin: 0.5rem 0; }
    p { color: #64748b; line-height: 1.6; margin: 0.5rem 0 1.5rem; font-size: 0.95rem; }
    button {
      background: linear-gradient(135deg, #22d3ee, #0891b2);
      color: white; font-weight: 700; border: 0; padding: 0.75rem 1.5rem;
      border-radius: 0.75rem; cursor: pointer; font-size: 0.95rem;
      box-shadow: 0 4px 14px rgba(8, 145, 178, 0.3);
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">📡</div>
    <h1>مفيش اتصال بالنت</h1>
    <p>
      نِظام محتاج اتصال علشان يجيب أحدث بيانات الموظفين والحضور.
      اتأكد إن الـ Wi-Fi أو الـ Mobile Data شغّال، وحاول تاني.
    </p>
    <button onclick="window.location.reload()">↻ حاول تاني</button>
  </main>
</body>
</html>
